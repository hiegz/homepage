<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" rel="image/x-icon" href="favicon.ico"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
    <script src="https://kit.fontawesome.com/6c8072bbc2.js" crossorigin="anonymous"></script>
    <script src="./utils.js" defer></script>
    <script src="./email.js" defer></script>
    <script src="./cv.js" defer></script>
    <script src="./index.js" defer></script>
    <title>hiegz</title>
</head>
<body>
    <div id="body">
        <header id="links">
            <a id="onlyfans-link" class="rect" href="https://www.youtube.com/watch?v=xvFZjo5PgG0" target="_blank">
                <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="32" height="32" viewBox="0,0,256,256">
                    <g fill="#323232" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="none" font-weight="none" font-size="none" text-anchor="none" style="mix-blend-mode: normal"><g transform="scale(5.33333,5.33333)"><path d="M16,9c-8.832,0 -16,7.168 -16,16c0,8.832 7.168,16 16,16c8.832,0 16,-7.168 16,-16c0,-8.832 -7.168,-16 -16,-16zM16,29.8c-2.656,0 -4.8,-2.144 -4.8,-4.8c0,-2.656 2.144,-4.8 4.8,-4.8c2.656,0 4.8,2.144 4.8,4.8c0,2.656 -2.144,4.8 -4.8,4.8z"></path><path d="M33.984,21c4.065,1.17 8.864,0 8.864,0c-1.392,6.08 -5.808,9.888 -12.176,10.352c-2.448,5.68 -8.096,9.648 -14.672,9.648l4.8,-15.256c4.934,-15.682 7.463,-16.744 19.165,-16.744h8.035c-1.344,5.92 -5.976,10.443 -14.016,12z"></path></g></g>
                </svg>
            </a>

            <a id="github-link" class="rect" href="https://github.com/hiegz" target="_blank">
                <i class="fa-brands fa-github" style="font-size: 26pt"></i>
            </a>

            <a id="source-link" class="rect" href="https://github.com/hiegz/homepage" target="_blank">
                <i class="fa-solid fa-code" style="font-size: 17pt"></i>
            </a>
        </header>

        <main id="profile">
            <img src="./assets/hiegz.png" id="profile-photo"/>

            <div>
                <h2 id="nickname">@hiegz</h2>
                <h1 id="fullname">Volodymyr But</h1>
                <div id="email">
                    <button id="email-button" onclick="onEmailButtonClick()">
                        <span id="email-address">
                            <!-- Set inside index.js -->
                            &nbsp;
                        </span>
                    </button>
                </div>
            </div>
        </main>

        <footer id="career">
            <a id="linkedin-link" class="rect" href="https://linked.in/in/hiegz" target="_blank">
                <i class="fa-brands fa-linkedin-in"></i>
            </a>

            <div id="cv">
                <button id="cv-download-button" onclick="onCVDownloadButtonClick()">
                    <span>
                        View my CV
                    </span>
                </button>

                <div id="cv-download-options">
                    <a href="https://drive.google.com/uc?export=download&id=1kHTWTJsmXfYvCN3cw-QG8lzTLhr34hR4" onclick="onCVDownloadOptionClick()" download>
                        <img src="./assets/uk.png"/>
                    </a>

                    <button onclick="onCVDownloadOptionClick()">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                    </button>

                    <a href="https://drive.google.com/uc?export=download&id=1FTHaZfZuZU0fADtpOkwifZxqAISOnOoh" onclick="onCVDownloadOptionClick()" download>
                        <img src="./assets/germany.png"/>
                    </a>
                </div>
            </div>
        </footer>
    </div>

    <noscript>
        <style>
            #body { display: none; }

            html  { height: 100%; }
            body {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #no-js-warning-block {
                border-radius: 5px;
                background: #E9D502;
            }

            #no-js-warning-block > h3 {
                font-weight: 700;
                color: #323232;
                padding: 10px 20px 0px 20px;
            }

            #no-js-warning-block > p {
                font-weight: 500;
                color: #323232;
                padding: 5px 20px 10px 20px;
            }
        </style>

        <div id="no-js-warning-block">
            <h3>Oops...</h3>
            <p>
                This webpage could not be loaded properly. <br/>
                Javascript is disabled or not supported.
            </p>
        </div>
    </noscript>
</body>
</html>
