<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"/>
    <script src="https://kit.fontawesome.com/6c8072bbc2.js" crossorigin="anonymous"></script>
    <script src="./index.js" defer></script>
    <title>hiegz</title>

<body>
    <div id="body">
        <div id="profile">
            <img src="./assets/hiegz.png" id="profile-photo"/>

            <div>
                <h2 id="nickname">@hiegz</h2>
                <h1 id="fullname">Volodymyr But</h1>
                <div id="email">
                    Say
                    <button id="email-button" onclick="onEmailButtonClick()">
                        <span id="email-address">
                            <!-- Set inside index.js -->
                            &nbsp;
                        </span>
                    </button>
                </div>
            </div>
        </div>

        <div id="socials">
            <p> You're probably looking for one of these:</p>

            <div id="links">
                <a href="https://linked.in/in/hiegz" target="_blank">
                    <i class="fa-brands fa-linkedin"></i>
                </a>

                <a href="https://github.com/hiegz" target="_blank">
                    <i class="fa-brands fa-square-github"></i>
                </a>


                <a href="https://x.com/hiegzz" target="_blank">
                    <i class="fa fa-brands fa-square-x-twitter"></i>
                </a>
            </div>
        </div>
    </div>

    <noscript>
        <style>
            #body { display: none; }

            html  { height: 100%; }
            body {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #no-js-warning-block {
                border-radius: 5px;
                background: #E9D502;
            }

            #no-js-warning-block > h3 {
                font-weight: 700;
                color: #323232;
                padding: 10px 20px 0px 20px;
            }

            #no-js-warning-block > p {
                font-weight: 500;
                color: #323232;
                padding: 5px 20px 10px 20px;
            }
        </style>

        <div id="no-js-warning-block">
            <h3>Oops...</h3>

                This webpage could not be loaded properly. <br/>
                Javascript is disabled or not supported.
